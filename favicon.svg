<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">

    <defs>
        <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#8B5CF6" />
            <stop offset="100%" stop-color="#06B6D4" />
        </linearGradient>

        <filter id="glow">
            <feGaussianBlur stdDeviation="6" result="b" />
            <feMerge>
                <feMergeNode in="b" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Background -->
    <rect width="256" height="256" rx="72" fill="#020617" />

    <!-- Soft ring -->
    <circle cx="128" cy="128" r="86" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="none" />

    <!-- Subtle orbit -->
    <circle cx="128" cy="128" r="92" stroke="url(#g)" stroke-width="1.5" stroke-dasharray="6 10" fill="none"
        opacity="0.6">
        <animateTransform attributeName="transform" type="rotate" from="0 128 128" to="360 128 128" dur="18s"
            repeatCount="indefinite" />
    </circle>

    <!-- Glow core -->
    <circle cx="128" cy="128" r="54" fill="url(#g)" opacity="0.18">
        <animate attributeName="opacity" values="0.12;0.22;0.12" dur="4s" repeatCount="indefinite" />
    </circle>

    <!-- Main S (clean & centered) -->
    <path d="M165 78
       C120 78 104 98 104 116
       C104 138 124 142 144 148
       C166 154 176 162 176 182
       C176 208 154 220 126 220
       C102 220 86 210 78 194" stroke="url(#g)" stroke-width="14" stroke-linecap="round" fill="none"
        filter="url(#glow)" />

    <!-- Inner highlight stroke -->
    <path d="M158 104
       C132 98 122 110 122 124
       C122 138 134 144 150 148" stroke="rgba(255,255,255,0.9)" stroke-width="6" stroke-linecap="round" fill="none"
        opacity="0.9" />

    <!-- Single accent dot -->
    <circle cx="178" cy="84" r="4" fill="#06B6D4">
        <animate attributeName="r" values="4;6;4" dur="3s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite" />
    </circle>

</svg>